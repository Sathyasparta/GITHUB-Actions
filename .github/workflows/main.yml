name: Build Test Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build Step
        run: echo "Hello World from Build"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Test Step
        run: echo "Hello World from Test"

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy Step
        run: echo "Hello World from Deploy"
